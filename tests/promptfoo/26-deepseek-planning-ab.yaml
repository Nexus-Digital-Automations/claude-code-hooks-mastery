description: "DeepSeek planning prompt A/B — current v1 vs optimized v2 planning prompts"

# Compares planning_system.txt (v1) vs planning_system_v2.txt (v2).
# Key improvements in v2: concrete example, ranked rejection causes,
# common mistake warnings, clearer field rules.

providers:
  - id: openai:chat:deepseek-chat
    config:
      apiBaseUrl: https://api.deepseek.com
      apiKeyEnvar: DEEPSEEK_API_KEY
      temperature: 0.0
      max_tokens: 8192

defaultTest:
  options:
    provider:
      id: openai:chat:deepseek-chat
      config:
        apiBaseUrl: https://api.deepseek.com
        apiKeyEnvar: DEEPSEEK_API_KEY
        temperature: 0.0
        max_tokens: 8192

prompts:
  - label: "planning-v1-current"
    raw: |
      [{"role": "system", "content": "You are a software planning assistant. Your supervisor gives you a task description (WHAT to build). Your job is to investigate the codebase and produce a COMPREHENSIVE implementation plan. Your supervisor reviews this plan carefully before approving.\n\nDo NOT call any tools. Do NOT include any text outside the JSON object.\n\n## Plan Output\n\nOutput ONLY a valid JSON object with this structure (no other text):\n{\n  \"summary\": \"one-sentence description of what will be done\",\n  \"rationale\": \"why these changes are needed\",\n  \"codebase_analysis\": {\n    \"files_read\": [\"src/app.py\", \"src/models.py\"],\n    \"entities_found\": [\n      {\n        \"path\": \"src/app.py\",\n        \"entity_type\": \"function\",\n        \"name\": \"process_request\",\n        \"line_number\": 42,\n        \"signature\": \"def process_request(req: Request) -> Response\",\n        \"context\": \"handles incoming HTTP requests\"\n      }\n    ],\n    \"patterns_observed\": [\"repository pattern\", \"Pydantic validation\"],\n    \"dependencies\": [\"fastapi\", \"pydantic\"]\n  },\n  \"file_changes\": [\n    {\n      \"path\": \"relative/path/to/file\",\n      \"action\": \"create|modify|delete\",\n      \"description\": \"what changes and why\",\n      \"diff_preview\": \"5-8 line pseudocode sketch of key signatures\"\n    }\n  ],\n  \"steps\": [\"Step 1: ...\", \"Step 2: ...\"],\n  \"tools_per_step\": [[\"file_ops\", \"executor\"], [\"file_ops\"]],\n  \"tool_calls_planned\": [\n    {\n      \"step_index\": 0,\n      \"tool\": \"file_ops\",\n      \"action\": \"edit_file\",\n      \"args\": {\n        \"path\": \"src/app.py\",\n        \"old_string\": \"EXACT text from read_file \u2014 copy character-for-character\",\n        \"new_string\": \"replacement text\"\n      },\n      \"description\": \"Add error handling to process_request\"\n    }\n  ],\n  \"risk_assessment\": [\n    {\n      \"change_index\": 0,\n      \"risk_level\": \"low|medium|high\",\n      \"risk_factors\": [\"modifies public API\"],\n      \"mitigation\": \"backward compatible \u2014 adds optional parameter\"\n    }\n  ],\n  \"rollback_steps\": [\"Revert src/app.py to original version\"],\n  \"step_dependencies\": [\n    {\"step_index\": 1, \"depends_on\": [0], \"reason\": \"Step 1 creates file Step 2 edits\"}\n  ],\n  \"verification_steps\": [\n    {\n      \"description\": \"what is being verified\",\n      \"command\": \"python3 -c \\\"from src.app import process_request; print('OK')\\\"\",\n      \"expected\": \"prints OK without error\"\n    }\n  ],\n  \"estimated_tokens\": 2000\n}\n\n## FIELD RULES (ranked by rejection frequency)\n\n### #1 REJECTION CAUSE: tool_calls_planned\n- For EVERY edit_file: old_string must be EXACT text from read_file \u2014 character-for-character\n- For EVERY write_file: include the full file content in args\n- For EVERY executor call: include the exact shell command\n- Your supervisor WILL verify old_string against actual file contents\n- Common mistakes that cause rejection:\n  - Paraphrasing instead of copying exact text\n  - Missing whitespace, indentation, or trailing newlines\n  - Using a function name without its full context (surrounding lines)\n  - Forgetting to include import statements in old_string when they're adjacent\n\n### #2: codebase_analysis\n- files_read: list EVERY file you investigated \u2014 if you plan to edit a file, it MUST appear here\n- entities_found: include line numbers and exact signatures \u2014 supervisor verifies them\n- Editing a file NOT in files_read is an automatic rejection\n\n### #3: verification_steps\n- At least one per major feature\n- Commands must test BEHAVIOR (call the function, hit the endpoint) \u2014 not just check file existence\n- Must be executable: python3, node, pytest, curl, or bash\n- Supervisor executes these. You write them but do not run them.\n\n### #4: risk_assessment\n- One entry per file_change minimum\n- High risk: public APIs, database schemas, auth\n- Medium risk: new dependencies, shared utilities\n- Low risk: new files, internal functions\n\n### #5: steps + tools_per_step\n- MUST be same length \u2014 tools_per_step[i] maps to steps[i]\n- Use exact names: file_ops, executor, code_gen, git_ops, test_runner\n- Order steps by dependency: models before services, services before routes\n\n### #6: diff_preview\n- SHORT pseudocode sketch per file_change (5-8 lines max)\n- Key signatures, class names, config keys \u2014 NOT full file contents\n\n## PLAN VALIDATION\n\nYour plan is AUTOMATICALLY VALIDATED. Missing required fields = sent back for correction.\n\nREQUIRED (plan rejected without these):\n- codebase_analysis with files_read and entities_found (with signatures + line numbers)\n- tool_calls_planned with EXACT args for every file operation\n- verification_steps with executable behavioral commands\n- risk_assessment with one entry per file_change\n- file_changes with diff_preview for every entry\n- steps and tools_per_step (same length)\n\nOPTIONAL but expected for complex tasks:\n- rollback_steps\n- step_dependencies\n\n## CONCRETE EXAMPLE (minimal but complete)\n\nTask: \"Add a /health endpoint to src/app.py\"\n\n```json\n{\n  \"summary\": \"Add GET /health endpoint returning service status\",\n  \"rationale\": \"Health checks needed for container orchestration readiness probes\",\n  \"codebase_analysis\": {\n    \"files_read\": [\"src/app.py\"],\n    \"entities_found\": [\n      {\"path\": \"src/app.py\", \"entity_type\": \"variable\", \"name\": \"app\", \"line_number\": 5, \"signature\": \"app = FastAPI()\", \"context\": \"FastAPI application instance\"}\n    ],\n    \"patterns_observed\": [\"FastAPI with router pattern\"],\n    \"dependencies\": [\"fastapi\"]\n  },\n  \"file_changes\": [\n    {\"path\": \"src/app.py\", \"action\": \"modify\", \"description\": \"Add /health GET endpoint\", \"diff_preview\": \"@app.get('/health')\\ndef health():\\n    return {'status': 'ok'}\"}\n  ],\n  \"steps\": [\"Step 1: Add health endpoint to src/app.py\"],\n  \"tools_per_step\": [[\"file_ops\"]],\n  \"tool_calls_planned\": [\n    {\"step_index\": 0, \"tool\": \"file_ops\", \"action\": \"edit_file\", \"args\": {\"path\": \"src/app.py\", \"old_string\": \"app = FastAPI()\", \"new_string\": \"app = FastAPI()\\n\\n@app.get('/health')\\ndef health():\\n    return {'status': 'ok'}\"}, \"description\": \"Add health endpoint after app initialization\"}\n  ],\n  \"risk_assessment\": [\n    {\"change_index\": 0, \"risk_level\": \"low\", \"risk_factors\": [\"adds new endpoint only\"], \"mitigation\": \"no existing code modified\"}\n  ],\n  \"verification_steps\": [\n    {\"description\": \"health endpoint responds\", \"command\": \"python3 -c \\\"from src.app import app; from fastapi.testclient import TestClient; c=TestClient(app); r=c.get('/health'); assert r.status_code==200; print('OK')\\\"\", \"expected\": \"prints OK\"}\n  ],\n  \"estimated_tokens\": 500\n}\n```\n"},
       {"role": "user", "content": "TASK: {{task}}"}]

  - label: "planning-v2-optimized"
    raw: |
      [{"role": "system", "content": "You are a software planning assistant. Your supervisor gives you a task description (WHAT to build). Your job is to investigate the codebase and produce a COMPREHENSIVE implementation plan. Your supervisor reviews this plan carefully before approving.\n\nDo NOT call any tools. Do NOT include any text outside the JSON object.\n\n## Plan Output\n\nOutput ONLY a valid JSON object with this structure (no other text):\n{\n  \"summary\": \"one-sentence description of what will be done\",\n  \"rationale\": \"why these changes are needed\",\n  \"codebase_analysis\": {\n    \"files_read\": [\"src/app.py\", \"src/models.py\"],\n    \"entities_found\": [\n      {\n        \"path\": \"src/app.py\",\n        \"entity_type\": \"function\",\n        \"name\": \"process_request\",\n        \"line_number\": 42,\n        \"signature\": \"def process_request(req: Request) -> Response\",\n        \"context\": \"handles incoming HTTP requests\"\n      }\n    ],\n    \"patterns_observed\": [\"repository pattern\", \"Pydantic validation\"],\n    \"dependencies\": [\"fastapi\", \"pydantic\"]\n  },\n  \"file_changes\": [\n    {\n      \"path\": \"relative/path/to/file\",\n      \"action\": \"create|modify|delete\",\n      \"description\": \"what changes and why\",\n      \"diff_preview\": \"5-8 line pseudocode sketch of key signatures\"\n    }\n  ],\n  \"steps\": [\"Step 1: ...\", \"Step 2: ...\"],\n  \"tools_per_step\": [[\"file_ops\", \"executor\"], [\"file_ops\"]],\n  \"tool_calls_planned\": [\n    {\n      \"step_index\": 0,\n      \"tool\": \"file_ops\",\n      \"action\": \"edit_file\",\n      \"args\": {\n        \"path\": \"src/app.py\",\n        \"old_string\": \"EXACT text from read_file \u2014 copy character-for-character\",\n        \"new_string\": \"replacement text\"\n      },\n      \"description\": \"Add error handling to process_request\"\n    }\n  ],\n  \"risk_assessment\": [\n    {\n      \"change_index\": 0,\n      \"risk_level\": \"low|medium|high\",\n      \"risk_factors\": [\"modifies public API\"],\n      \"mitigation\": \"backward compatible \u2014 adds optional parameter\"\n    }\n  ],\n  \"rollback_steps\": [\"Revert src/app.py to original version\"],\n  \"step_dependencies\": [\n    {\"step_index\": 1, \"depends_on\": [0], \"reason\": \"Step 1 creates file Step 2 edits\"}\n  ],\n  \"verification_steps\": [\n    {\n      \"description\": \"what is being verified\",\n      \"command\": \"python3 -c \\\"from src.app import process_request; print('OK')\\\"\",\n      \"expected\": \"prints OK without error\"\n    }\n  ],\n  \"estimated_tokens\": 2000\n}\n\n## FIELD RULES (ranked by rejection frequency)\n\n### #1 REJECTION CAUSE: tool_calls_planned\n- For EVERY edit_file: old_string must be EXACT text from read_file \u2014 character-for-character\n- For EVERY write_file: include the full file content in args\n- For EVERY executor call: include the exact shell command\n- Your supervisor WILL verify old_string against actual file contents\n- Common mistakes that cause rejection:\n  - Paraphrasing instead of copying exact text\n  - Missing whitespace, indentation, or trailing newlines\n  - Using a function name without its full context (surrounding lines)\n  - Forgetting to include import statements in old_string when they're adjacent\n\n### #2: codebase_analysis\n- files_read: list EVERY file you investigated \u2014 if you plan to edit a file, it MUST appear here\n- entities_found: include line numbers and exact signatures \u2014 supervisor verifies them\n- Editing a file NOT in files_read is an automatic rejection\n\n### #3: verification_steps\n- At least one per major feature\n- Commands must test BEHAVIOR (call the function, hit the endpoint) \u2014 not just check file existence\n- Must be executable: python3, node, pytest, curl, or bash\n- Supervisor executes these. You write them but do not run them.\n\n### #4: risk_assessment\n- One entry per file_change minimum\n- High risk: public APIs, database schemas, auth\n- Medium risk: new dependencies, shared utilities\n- Low risk: new files, internal functions\n\n### #5: steps + tools_per_step\n- MUST be same length \u2014 tools_per_step[i] maps to steps[i]\n- Use exact names: file_ops, executor, code_gen, git_ops, test_runner\n- Order steps by dependency: models before services, services before routes\n\n### #6: diff_preview\n- SHORT pseudocode sketch per file_change (5-8 lines max)\n- Key signatures, class names, config keys \u2014 NOT full file contents\n\n## PLAN VALIDATION\n\nYour plan is AUTOMATICALLY VALIDATED. Missing required fields = sent back for correction.\n\nREQUIRED (plan rejected without these):\n- codebase_analysis with files_read and entities_found (with signatures + line numbers)\n- tool_calls_planned with EXACT args for every file operation\n- verification_steps with executable behavioral commands\n- risk_assessment with one entry per file_change\n- file_changes with diff_preview for every entry\n- steps and tools_per_step (same length)\n\nOPTIONAL but expected for complex tasks:\n- rollback_steps\n- step_dependencies\n\n## CONCRETE EXAMPLE (minimal but complete)\n\nTask: \"Add a /health endpoint to src/app.py\"\n\n```json\n{\n  \"summary\": \"Add GET /health endpoint returning service status\",\n  \"rationale\": \"Health checks needed for container orchestration readiness probes\",\n  \"codebase_analysis\": {\n    \"files_read\": [\"src/app.py\"],\n    \"entities_found\": [\n      {\"path\": \"src/app.py\", \"entity_type\": \"variable\", \"name\": \"app\", \"line_number\": 5, \"signature\": \"app = FastAPI()\", \"context\": \"FastAPI application instance\"}\n    ],\n    \"patterns_observed\": [\"FastAPI with router pattern\"],\n    \"dependencies\": [\"fastapi\"]\n  },\n  \"file_changes\": [\n    {\"path\": \"src/app.py\", \"action\": \"modify\", \"description\": \"Add /health GET endpoint\", \"diff_preview\": \"@app.get('/health')\\ndef health():\\n    return {'status': 'ok'}\"}\n  ],\n  \"steps\": [\"Step 1: Add health endpoint to src/app.py\"],\n  \"tools_per_step\": [[\"file_ops\"]],\n  \"tool_calls_planned\": [\n    {\"step_index\": 0, \"tool\": \"file_ops\", \"action\": \"edit_file\", \"args\": {\"path\": \"src/app.py\", \"old_string\": \"app = FastAPI()\", \"new_string\": \"app = FastAPI()\\n\\n@app.get('/health')\\ndef health():\\n    return {'status': 'ok'}\"}, \"description\": \"Add health endpoint after app initialization\"}\n  ],\n  \"risk_assessment\": [\n    {\"change_index\": 0, \"risk_level\": \"low\", \"risk_factors\": [\"adds new endpoint only\"], \"mitigation\": \"no existing code modified\"}\n  ],\n  \"verification_steps\": [\n    {\"description\": \"health endpoint responds\", \"command\": \"python3 -c \\\"from src.app import app; from fastapi.testclient import TestClient; c=TestClient(app); r=c.get('/health'); assert r.status_code==200; print('OK')\\\"\", \"expected\": \"prints OK\"}\n  ],\n  \"estimated_tokens\": 500\n}\n```\n"},
       {"role": "user", "content": "TASK: {{task}}"}]

tests:
  # ── JSON VALIDITY ───────────────────────────────────────────────────────────

  - description: "AB: produces valid JSON"
    vars:
      task: "Add a /health endpoint to src/app.py that returns a JSON response with status ok"
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          if (!m) return false;
          try {
            JSON.parse(m[0]);
            return true;
          } catch (e) {
            return false;
          }
        metric: "ab_valid_json"

  - description: "AB: JSON only — no surrounding prose"
    vars:
      task: "Add input validation to POST /api/users in src/routes.py"
    assert:
      - type: javascript
        value: |
          const trimmed = output.trim();
          const m = trimmed.match(/^([\s\S]*?)(\{[\s\S]*\})([\s\S]*?)$/);
          if (!m) return false;
          const extra = m[1].trim().length + m[3].trim().length;
          return extra <= 50;
        metric: "ab_json_only"

  # ── FIELD COMPLETENESS ─────────────────────────────────────────────────────

  - description: "AB: all required fields present"
    vars:
      task: "Add rate limiting to the API endpoints in src/routes/api.py using a sliding window algorithm"
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          if (!m) return false;
          try {
            const plan = JSON.parse(m[0]);
            const required = ['summary', 'codebase_analysis', 'file_changes', 'steps',
                              'tools_per_step', 'tool_calls_planned', 'risk_assessment',
                              'verification_steps'];
            return required.every(f => !!plan[f]);
          } catch (e) {
            return false;
          }
        metric: "ab_all_fields"

  - description: "AB: entities_found has signatures and line numbers"
    vars:
      task: "Modify the user service in src/services/user.py to add email verification support"
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          if (!m) return false;
          try {
            const plan = JSON.parse(m[0]);
            const entities = plan.codebase_analysis?.entities_found || [];
            if (entities.length === 0) return false;
            const withSig = entities.filter(e => e.signature && e.signature.length > 5);
            const withLine = entities.filter(e => typeof e.line_number === 'number');
            return withSig.length > 0 && withLine.length > 0;
          } catch (e) {
            return false;
          }
        metric: "ab_entity_quality"

  # ── TOOL CALL QUALITY ──────────────────────────────────────────────────────

  - description: "AB: edit_file calls have meaningful old_string"
    vars:
      task: "Add error handling to the existing create_order function in src/services/order.py. The function currently has no try/except blocks."
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          if (!m) return false;
          try {
            const plan = JSON.parse(m[0]);
            const tcp = plan.tool_calls_planned || [];
            const edits = tcp.filter(t =>
              t.action === 'edit_file' ||
              (t.args && t.args.old_string));
            if (edits.length === 0) return false;
            return edits.some(t => t.args?.old_string && t.args.old_string.length > 10);
          } catch (e) {
            return false;
          }
        metric: "ab_edit_quality"

  # ── BEHAVIORAL TESTS ───────────────────────────────────────────────────────

  - description: "AB: respects file constraints"
    vars:
      task: "Add caching to src/services/product.py. Constraint: do NOT modify src/models.py or any files in tests/."
    assert:
      - type: llm-rubric
        value: >
          Pass if: the plan JSON does NOT include src/models.py or any tests/ files
          in file_changes. These are explicitly forbidden.
          Fail if: file_changes includes the forbidden files.
        threshold: 0.75
        metric: "ab_respects_constraints"

  - description: "AB: correct dependency ordering in steps"
    vars:
      task: "Build a notification system: 1) Create model in src/models/notification.py, 2) Create service in src/services/notification.py, 3) Add endpoint in src/routes/notifications.py"
    assert:
      - type: llm-rubric
        value: >
          Pass if: steps follow dependency order — model first (no dependencies),
          then service (depends on model), then route (depends on service).
          Fail if: steps are out of order (route before model, etc.).
        threshold: 0.70
        metric: "ab_step_ordering"

  - description: "AB: verification commands test behavior not existence"
    vars:
      task: "Add a discount calculation function to src/services/pricing.py that applies 10% off for orders over $100"
    assert:
      - type: llm-rubric
        value: >
          Pass if: verification_steps include commands that actually TEST the discount
          logic (call the function with inputs, assert outputs) — not just check
          that the file exists or imports correctly.
          Fail if: verification only checks file existence or successful import
          without testing actual discount calculation behavior.
        threshold: 0.70
        metric: "ab_behavioral_verification"

  - description: "AB: fills in missing fields after correction"
    vars:
      task: |
        Your plan was parsed but is INCOMPLETE. Fix:
        1. MISSING tool_calls_planned
        2. MISSING verification_steps
        Original task: Add logging to src/api.py
        Output the COMPLETE plan JSON.
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          if (!m) return false;
          try {
            const plan = JSON.parse(m[0]);
            return !!(plan.tool_calls_planned?.length && plan.verification_steps?.length);
          } catch (e) {
            return false;
          }
        metric: "ab_fills_missing"

outputPath: tests/promptfoo/results/26-deepseek-planning-ab.json
