prompts:
- label: python-testing-patterns
  raw: '[{"role": "system", "content": "# Python Testing Patterns\n\nComprehensive guide to implementing robust testing strategies
    in Python using pytest, fixtures, mocking, parameterization, and test-driven development practices.\n\n## When to Use
    This Skill\n\n- Writing unit tests for Python code\n- Setting up test suites and test infrastructure\n- Implementing test-driven
    development (TDD)\n- Creating integration tests for APIs and services\n- Mocking external dependencies and services\n-
    Testing async code and concurrent operations\n- Setting up continuous testing in CI/CD\n- Implementing property-based
    testing\n- Testing database operations\n- Debugging failing tests\n\n## Core Concepts\n\n### 1. Test Types\n- **Unit Tests**:
    Test individual functions/classes in isolation\n- **Integration Tests**: Test interaction between components\n- **Functional
    Tests**: Test complete features end-to-end\n- **Performance Tests**: Measure speed and resource usage\n\n### 2. Test Structure
    (AAA Pattern)\n- **Arrange**: Set up test data and preconditions\n- **Act**: Execute the code under test\n- **Assert**:
    Verify the results\n\n### 3. Test Coverage\n- Measure what code is exercised by tests\n- Identify untested code paths\n-
    Aim for meaningful coverage, not just high percentages\n\n### 4. Test Isolation\n- Tests should be independent\n- No shared
    state between tests\n- Each test should clean up after itself\n\n## Quick Start\n\n```python\n# test_example.py\ndef add(a,
    b):\n    return a + b\n\ndef test_add():\n    \"\"\"Basic test example.\"\"\"\n    result = add(2, 3)\n    assert result
    == 5\n\ndef test_add_negative():\n    \"\"\"Test with negative numbers.\"\"\"\n    assert add(-1, 1) == 0\n\n# Run with:
    pytest test_example.py\n```\n\n## Fundamental Patterns\n\n### Pattern 1: Basic pytest Tests\n\n```python\n# test_calculator.py\nimport
    pytest\n\nclass Calculator:\n    \"\"\"Simple calculator for testing.\"\"\"\n\n    def add(self, a: float, b: float) ->
    float:\n        return a + b\n\n    def subtract(self, a: float, b: float) -> float:\n        return a - b\n\n    def
    multiply(self, a: float, b: float) -> float:\n        return a * b\n\n    def divide(self, a: float, b: float) -> float:\n        if
    b == 0:\n            raise ValueError(\"Cannot divide by zero\")\n        return a / b\n\n\ndef test_addition():\n    \"\"\"Test
    addition.\"\"\"\n    calc = Calculator()\n    assert calc.add(2, 3) == 5\n    assert calc.add(-1, 1) == 0\n    assert
    calc.add(0, 0) == 0\n\n\ndef test_subtraction():\n    \"\"\"Test subtraction.\"\"\"\n    calc = Calculator()\n    assert
    calc.subtract(5, 3) == 2\n    assert calc.subtract(0, 5) == -5\n\n\n\n[... truncated ...]"}, {"role": "user", "content":
    "{{task}}"}]'
- label: code-review-excellence
  raw: '[{"role": "system", "content": "# Code Review Excellence\n\nTransform code reviews from gatekeeping to knowledge sharing
    through constructive feedback, systematic analysis, and collaborative improvement.\n\n## When to Use This Skill\n\n- Reviewing
    pull requests and code changes\n- Establishing code review standards for teams\n- Mentoring junior developers through
    reviews\n- Conducting architecture reviews\n- Creating review checklists and guidelines\n- Improving team collaboration\n-
    Reducing code review cycle time\n- Maintaining code quality standards\n\n## Core Principles\n\n### 1. The Review Mindset\n\n**Goals
    of Code Review:**\n- Catch bugs and edge cases\n- Ensure code maintainability\n- Share knowledge across team\n- Enforce
    coding standards\n- Improve design and architecture\n- Build team culture\n\n**Not the Goals:**\n- Show off knowledge\n-
    Nitpick formatting (use linters)\n- Block progress unnecessarily\n- Rewrite to your preference\n\n### 2. Effective Feedback\n\n**Good
    Feedback is:**\n- Specific and actionable\n- Educational, not judgmental\n- Focused on the code, not the person\n- Balanced
    (praise good work too)\n- Prioritized (critical vs nice-to-have)\n\n```markdown\n❌ Bad: \"This is wrong.\"\n✅ Good: \"This
    could cause a race condition when multiple users\n         access simultaneously. Consider using a mutex here.\"\n\n❌
    Bad: \"Why didn''t you use X pattern?\"\n✅ Good: \"Have you considered the Repository pattern? It would\n         make
    this easier to test. Here''s an example: [link]\"\n\n❌ Bad: \"Rename this variable.\"\n✅ Good: \"[nit] Consider `userCount`
    instead of `uc` for\n         clarity. Not blocking if you prefer to keep it.\"\n```\n\n### 3. Review Scope\n\n**What
    to Review:**\n- Logic correctness and edge cases\n- Security vulnerabilities\n- Performance implications\n- Test coverage
    and quality\n- Error handling\n- Documentation and comments\n- API design and naming\n- Architectural fit\n\n**What Not
    to Review Manually:**\n- Code formatting (use Prettier, Black, etc.)\n- Import organization\n- Linting violations\n- Simple
    typos\n\n## Review Process\n\n### Phase 1: Context Gathering (2-3 minutes)\n\n```markdown\nBefore diving into code, understand:\n\n1.
    Read PR description and linked issue\n2. Check PR size (>400 lines? Ask to split)\n3. Review CI/CD status (tests passing?)\n4.
    Understand the business requirement\n5. Note any relevant architectural decisions\n```\n\n### Phase 2: High-Level Review
    (5-10 minutes)\n\n```markdown\n1. **Architecture & Design**\n   - Does the solution fit the problem?\n   - Are there simpler
    approaches?\n\n[... truncated ...]"}, {"role": "user", "content": "{{task}}"}]'
- label: architecture-patterns
  raw: '[{"role": "system", "content": "# Architecture Patterns\n\nMaster proven backend architecture patterns including Clean
    Architecture, Hexagonal Architecture, and Domain-Driven Design to build maintainable, testable, and scalable systems.\n\n##
    When to Use This Skill\n\n- Designing new backend systems from scratch\n- Refactoring monolithic applications for better
    maintainability\n- Establishing architecture standards for your team\n- Migrating from tightly coupled to loosely coupled
    architectures\n- Implementing domain-driven design principles\n- Creating testable and mockable codebases\n- Planning
    microservices decomposition\n\n## Core Concepts\n\n### 1. Clean Architecture (Uncle Bob)\n\n**Layers (dependency flows
    inward):**\n- **Entities**: Core business models\n- **Use Cases**: Application business rules\n- **Interface Adapters**:
    Controllers, presenters, gateways\n- **Frameworks & Drivers**: UI, database, external services\n\n**Key Principles:**\n-
    Dependencies point inward\n- Inner layers know nothing about outer layers\n- Business logic independent of frameworks\n-
    Testable without UI, database, or external services\n\n### 2. Hexagonal Architecture (Ports and Adapters)\n\n**Components:**\n-
    **Domain Core**: Business logic\n- **Ports**: Interfaces defining interactions\n- **Adapters**: Implementations of ports
    (database, REST, message queue)\n\n**Benefits:**\n- Swap implementations easily (mock for testing)\n- Technology-agnostic
    core\n- Clear separation of concerns\n\n### 3. Domain-Driven Design (DDD)\n\n**Strategic Patterns:**\n- **Bounded Contexts**:
    Separate models for different domains\n- **Context Mapping**: How contexts relate\n- **Ubiquitous Language**: Shared terminology\n\n**Tactical
    Patterns:**\n- **Entities**: Objects with identity\n- **Value Objects**: Immutable objects defined by attributes\n- **Aggregates**:
    Consistency boundaries\n- **Repositories**: Data access abstraction\n- **Domain Events**: Things that happened\n\n## Clean
    Architecture Pattern\n\n### Directory Structure\n```\napp/\n├── domain/           # Entities & business rules\n│   ├──
    entities/\n│   │   ├── user.py\n│   │   └── order.py\n│   ├── value_objects/\n│   │   ├── email.py\n│   │   └── money.py\n│   └──
    interfaces/   # Abstract interfaces\n│       ├── user_repository.py\n│       └── payment_gateway.py\n├── use_cases/        #
    Application business rules\n│   ├── create_user.py\n│   ├── process_order.py\n│   └── send_notification.py\n├── adapters/         #
    Interface implementations\n│   ├── repositories/\n│   │   ├── postgres_user_repository.py\n\n[... truncated ...]"}, {"role":
    "user", "content": "{{task}}"}]'
- label: debugging-strategies
  raw: '[{"role": "system", "content": "# Debugging Strategies\n\nTransform debugging from frustrating guesswork into systematic
    problem-solving with proven strategies, powerful tools, and methodical approaches.\n\n## When to Use This Skill\n\n- Tracking
    down elusive bugs\n- Investigating performance issues\n- Understanding unfamiliar codebases\n- Debugging production issues\n-
    Analyzing crash dumps and stack traces\n- Profiling application performance\n- Investigating memory leaks\n- Debugging
    distributed systems\n\n## Core Principles\n\n### 1. The Scientific Method\n\n**1. Observe**: What''s the actual behavior?\n**2.
    Hypothesize**: What could be causing it?\n**3. Experiment**: Test your hypothesis\n**4. Analyze**: Did it prove/disprove
    your theory?\n**5. Repeat**: Until you find the root cause\n\n### 2. Debugging Mindset\n\n**Don''t Assume:**\n- \"It can''t
    be X\" - Yes it can\n- \"I didn''t change Y\" - Check anyway\n- \"It works on my machine\" - Find out why\n\n**Do:**\n-
    Reproduce consistently\n- Isolate the problem\n- Keep detailed notes\n- Question everything\n- Take breaks when stuck\n\n###
    3. Rubber Duck Debugging\n\nExplain your code and problem out loud (to a rubber duck, colleague, or yourself). Often reveals
    the issue.\n\n## Systematic Debugging Process\n\n### Phase 1: Reproduce\n\n```markdown\n## Reproduction Checklist\n\n1.
    **Can you reproduce it?**\n   - Always? Sometimes? Randomly?\n   - Specific conditions needed?\n   - Can others reproduce
    it?\n\n2. **Create minimal reproduction**\n   - Simplify to smallest example\n   - Remove unrelated code\n   - Isolate
    the problem\n\n3. **Document steps**\n   - Write down exact steps\n   - Note environment details\n   - Capture error messages\n```\n\n###
    Phase 2: Gather Information\n\n```markdown\n## Information Collection\n\n1. **Error Messages**\n   - Full stack trace\n   -
    Error codes\n   - Console/log output\n\n2. **Environment**\n   - OS version\n   - Language/runtime version\n   - Dependencies
    versions\n   - Environment variables\n\n3. **Recent Changes**\n   - Git history\n   - Deployment timeline\n   - Configuration
    changes\n\n4. **Scope**\n   - Affects all users or specific ones?\n   - All browsers or specific ones?\n   - Production
    only or also dev?\n```\n\n### Phase 3: Form Hypothesis\n\n```markdown\n## Hypothesis Formation\n\nBased on gathered info,
    ask:\n\n1. **What changed?**\n   - Recent code changes\n   - Dependency updates\n   - Infrastructure changes\n\n2. **What''s
    different?**\n   - Working vs broken environment\n   - Working vs broken user\n   - Before vs after\n\n3. **Where could
    this fail?**\n   - Input validation\n   - Business logic\n\n[... truncated ...]"}, {"role": "user", "content": "{{task}}"}]'
