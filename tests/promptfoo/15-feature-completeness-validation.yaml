description: "Feature completeness validation — STEP 0.5, stricter VANILLA_JS, alert() rejection"

# Tests that deepseek_verifier.py correctly enforces the new feature completeness rules:
# 1. STEP 0.5: rejects immediately when requested features have no implementation evidence
# 2. VANILLA_JS: partial feature coverage is no longer acceptable (was 'relaxed', now stricter)
# 3. alert()/confirm() substituted for a requested modal = reject immediately
#
# Provider imports _SYSTEM_PROMPT directly from deepseek_verifier.py — tests always
# reflect the current system prompt without manual sync.

providers:
  - id: file://deepseek_review_provider.py

defaultTest:
  options:
    provider:
      id: openai:chat:gpt-4o-mini
      config:
        apiKeyEnvar: OPENAI_API_KEY

prompts:
  - label: "evidence-record-passthrough"
    raw: "{{evidence_record}}"

tests:
  # ── GROUP 1: STEP 0.5 — Missing features must be rejected immediately ─────────────

  - description: "Flashcard app: 6 features requested, happy path only covers quiz start + card flip — REJECT with missing features"
    vars:
      evidence_record: |
        === WORK CONTEXT ===
        Last task: Build a flashcard quiz app with full deck management (create deck, edit deck
        name, delete deck), card management per deck (add card, edit card, delete card), quiz mode
        (flip cards, Got It / Keep Studying buttons), and a quiz summary modal (HTML overlay with
        score percentage, number correct/total, Restart button) at end of quiz session.
        Task type (classified at submit): feature

        Last assistant message (what Claude told the user it did):
          Built the flashcard quiz app. index.html has deck creation form, quiz mode, and card flip
          functionality. Tested by creating a deck, starting a quiz, and confirming cards flip.

        Files actually modified this session (from Edit/Write tool calls):
          index.html
          style.css
          app.js

        Bash commands actually run this session (last 30):
          $ cat index.html
          $ node -e "const {JSDOM}=require('jsdom');const d=new JSDOM('<html></html>');console.log('ok')"
          $ cat app.js

        ====================

        Please review the following 10 verification steps and determine if the evidence is genuine.

        --- Step 1: TESTS ---
        Status: done
        Evidence: 'node test.js: 3 passed, 0 failed — deck creation works, quiz starts, card flips'

        --- Step 2: BUILD ---
        Status: skipped
        Skip reason: 'vanilla JS — no build step'

        --- Step 3: LINT ---
        Status: skipped
        Skip reason: 'no linter configured'

        --- Step 4: APP STARTS ---
        Status: skipped
        Skip reason: 'static HTML — no server'

        --- Step 5: CODE/SCRIPT/API EXECUTION ---
        Status: done
        Evidence: 'node test.js: createDeck("Test") → added to list ✓; startQuiz() → quiz mode entered ✓; flipCard() → answer revealed ✓. 3 tests passed 0 failed.'

        --- Step 6: FRONTEND VALIDATION ---
        Status: done
        Evidence: 'opened index.html, typed deck name, clicked Create, deck appeared in list, clicked Start Quiz, first card shown, clicked card to flip, answer revealed'

        --- Step 7: HAPPY PATH ---
        Status: done
        Evidence: 'created deck Test with 2 cards, clicked Start Quiz, card flipped showing answer, clicked Got It, second card shown, quiz completed'

        --- Step 8: ERROR CASES ---
        Status: done
        Evidence: 'tried starting quiz with empty deck — error message shown. Tried creating deck with blank name — input blocked.'

        --- Step 9: COMMIT & PUSH ---
        Status: done
        Evidence: 'committed index.html, style.css, app.js and pushed to origin main'

        --- Step 10: UPSTREAM SYNC ---
        Status: done
        Evidence: '0 commits behind'
    assert:
      - type: llm-rubric
        value: >
          Pass if: the reviewer OUTPUT shows approved=false (rejected). The task explicitly
          requested at minimum 8 distinct features: create deck, EDIT DECK, DELETE DECK,
          add card, EDIT CARD, DELETE CARD, quiz mode with flip, QUIZ SUMMARY MODAL (HTML overlay).
          The tests and happy path only demonstrate 3: create deck, start quiz, card flip.
          Missing with zero evidence: edit deck, delete deck, add card, edit card, delete card,
          quiz summary modal. Under STEP 0.5, the reviewer must reject immediately and list
          the unimplemented features. The verdict should name at minimum delete deck, card
          management (add/edit/delete card), and quiz summary modal as missing.
          Fail if: the reviewer approves (approved=true) — this is the exact failure mode
          the new system is designed to catch. Partial credit if reviewer asks a question
          specifically about missing features rather than approving.
        threshold: 0.80
        metric: "rejects_missing_features_flashcard"

  - description: "Todo app: all 4 features have JSDOM test output with specific action→result — APPROVE"
    vars:
      evidence_record: |
        === WORK CONTEXT ===
        Last task: Build a todo list app with: add todo (form input), edit todo (inline double-click),
        delete todo (button removes item), mark todo complete (checkbox toggles strikethrough).
        Task type (classified at submit): feature

        Last assistant message (what Claude told the user it did):
          Built the todo app. All 4 features implemented and JSDOM-tested individually.
          Each feature has specific test output showing actual DOM state changes.

        Files actually modified this session (from Edit/Write tool calls):
          index.html
          app.js
          style.css

        Bash commands actually run this session (last 30):
          $ node test.js
          $ git add index.html app.js style.css
          $ git commit -m "Add todo list app with all 4 features"
          [main a1b2c3d] Add todo list app with all 4 features
           3 files changed, 187 insertions(+)
          $ git push origin main
          To github.com:user/todo-app.git
             f4e5d6c..a1b2c3d  main -> main
          $ git status
          On branch main
          Your branch is up to date with 'origin/main'.

        ====================

        Please review the following 10 verification steps and determine if the evidence is genuine.

        --- Step 1: TESTS ---
        Status: done
        Evidence: |
          node test.js output:
          PASS add-todo: addTodo("Buy milk") → list.children.length = 1, li.textContent = "Buy milk"
          PASS edit-todo: editTodo(0, "Buy oat milk") → li.textContent = "Buy oat milk"
          PASS delete-todo: deleteTodo(0) → list.children.length = 0, li not in DOM
          PASS complete-todo: completeTodo(0) → li.classList.contains("done") = true
          4 passed, 0 failed

        --- Step 2: BUILD ---
        Status: skipped
        Skip reason: 'vanilla JS — no build step'

        --- Step 3: LINT ---
        Status: skipped
        Skip reason: 'no linter configured'

        --- Step 4: APP STARTS ---
        Status: skipped
        Skip reason: 'static HTML — no server'

        --- Step 5: CODE/SCRIPT/API EXECUTION ---
        Status: done
        Evidence: |
          node test.js (JSDOM) raw output:
          PASS add-todo: addTodo("Buy milk") → list.children.length = 1, li.textContent = "Buy milk"
          PASS edit-todo: editTodo(0, "Buy oat milk") → li.textContent = "Buy oat milk"
          PASS delete-todo: deleteTodo(0) → list.children.length = 0, li not in DOM
          PASS complete-todo: completeTodo(0) → li.classList.contains("done") = true, style.textDecoration = "line-through"
          PASS add-two: addTodo("Buy milk"), addTodo("Read book") → list.children.length = 2
          PASS happy-path: add(milk)+add(book)+complete(0)+edit(1,twoBks)+delete(1) → list.length=1, item="Buy milk"(.done)
          PASS err-empty-add: addTodo("") → list.length unchanged = 0
          PASS err-empty-edit: editTodo(0,"") → li.textContent unchanged
          PASS err-out-of-bounds: deleteTodo(99) → no throw, list.length unchanged
          9 passed, 0 failed

        --- Step 6: FRONTEND VALIDATION ---
        Status: done
        Evidence: |
          JSDOM test (node test.js above) IS the frontend validation for this vanilla JS project.
          All 4 requested features verified with DOM state output:
          - add-todo: list.children.length = 1, li.textContent = "Buy milk"
          - edit-todo: li.textContent = "Buy oat milk"
          - delete-todo: list.children.length = 0
          - complete-todo: li.classList.contains("done") = true, textDecoration = "line-through"

        --- Step 7: HAPPY PATH ---
        Status: done
        Evidence: |
          From node test.js PASS happy-path:
          addTodo("Buy milk") → length=1; addTodo("Read book") → length=2;
          completeTodo(0) → "Buy milk" has .done class;
          editTodo(1, "Read two books") → li.textContent="Read two books";
          deleteTodo(1) → length=1, only "Buy milk"(.done) remains.
          All 4 features exercised end-to-end in sequence.

        --- Step 8: ERROR CASES ---
        Status: done
        Evidence: |
          From node test.js:
          PASS err-empty-add: addTodo("") → list.length unchanged = 0
          PASS err-empty-edit: editTodo(0,"") → li.textContent unchanged
          PASS err-out-of-bounds: deleteTodo(99) → no throw, list.length unchanged

        --- Step 9: COMMIT & PUSH ---
        Status: done
        Evidence: |
          $ git log --oneline -3
          a1b2c3d (HEAD -> main, origin/main) Add todo list app with all 4 features
          f4e5d6c Initial commit
          git push output: To github.com:user/todo-app.git  f4e5d6c..a1b2c3d  main -> main

        --- Step 10: UPSTREAM SYNC ---
        Status: done
        Evidence: |
          $ git status
          On branch main
          Your branch is up to date with 'origin/main'.
          nothing to commit, working tree clean
    assert:
      - type: llm-rubric
        value: >
          Pass if: the reviewer APPROVES (approved=true). All 4 requested features have
          explicit JSDOM test output with specific DOM state evidence:
          add (list.length=1 + text matches), edit (textContent changed), delete (element removed, length=0),
          complete (.done class applied). Per STEP 0.5 JSDOM coverage rule: JSDOM test output
          that names each feature with action→result IS sufficient. All 4 features are named
          with their specific observed DOM outcomes. The reviewer should pass STEP 0.5 (all features
          covered) and pass individual checks (TESTS genuine, CODE/SCRIPT genuine JSDOM output,
          FRONTEND/HAPPY PATH use same JSDOM as per vanilla JS rules).
          Fail if: reviewer rejects when all 4 features have explicit JSDOM DOM-state evidence.
        threshold: 0.60
        metric: "approves_all_features_covered_todo"

  # ── GROUP 2: alert()/confirm() substituted for a requested modal ──────────────────

  - description: "alert() used instead of explicitly requested HTML modal overlay — REJECT"
    vars:
      evidence_record: |
        === WORK CONTEXT ===
        Last task: Build a quiz app. At quiz end: show a proper HTML modal overlay (not alert/confirm)
