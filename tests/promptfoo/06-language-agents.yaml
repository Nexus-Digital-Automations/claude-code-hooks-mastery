- description: 'javascript-pro: Write a JavaScript event emitter class with proper memory le...'
  vars:
    task: Write a JavaScript event emitter class with proper memory leak prevention and TypeScript-compatible JSDoc
  assert:
  - type: llm-rubric
    value: Uses modern ES6+ class syntax, handles edge cases, includes proper cleanup, has useful JSDoc
    threshold: 0.7
    metric: javascript-pro_quality
- description: 'bash-pro: Write a defensive bash script that backs up a directory with...'
  vars:
    task: Write a defensive bash script that backs up a directory with rotation, error handling, and logging
  assert:
  - type: llm-rubric
    value: Uses set -euo pipefail, proper quoting, error handling, logging to stderr, and safe temp files
    threshold: 0.7
