description: "DeepSeek mode delegation — mode-specific CLAUDE.md files control behavior"

# Tests that mode-specific CLAUDE.md files correctly control delegation behavior.
# CLAUDE.claude.md: direct execution, no DeepSeek delegation
# CLAUDE.deepseek.md: supervisor mode, code tasks delegate to DeepSeek
#
# Guard blocks have been removed from SKILL.md files — CLAUDE.md is the single
# source of truth for mode behavior. DeepSeek has its own skills in
# ~/.claude/deepseek-skills/ that are automatically loaded by the MCP server.

providers:
  - id: openai:chat:gpt-4o-mini
    config:
      apiKeyEnvar: OPENAI_API_KEY

defaultTest:
  options:
    provider:
      id: openai:chat:gpt-4o-mini
      config:
        apiKeyEnvar: OPENAI_API_KEY

prompts:
  - label: "mode-specific-claude-md"
    raw: |
      You are Claude Code. Your CLAUDE.md has been loaded below.

      ════════════════════════════════════════
      ACTIVE MODE: {{mode}}
      ════════════════════════════════════════

      --- BEGIN CLAUDE.md (mode-specific) ---
      {{claude_md_excerpt}}
      --- END CLAUDE.md ---

      {{skill_section}}

      ════════════════════════════════════════
      REMINDER: Your mode is {{mode}}. Follow ONLY your CLAUDE.md rules.
      ════════════════════════════════════════

      User request: {{user_task}}

      State your mode at the start of your response, then act accordingly.

tests:
  # ── GROUP 1: MODE-RULES-ONLY (no skill content) ──────────────────────────────
  - description: "deepseek + code task → delegates via mcp__deepseek-agent__run"
    vars:
      mode: "deepseek"
      user_task: "Create a Weather Dashboard web app"
      skill_section: ""
      claude_md_excerpt: |
        ## CORE IDENTITY
        You are a **capable engineering supervisor** who values:
        - **Skepticism** - Never trust DeepSeek output without verification
        - **Quality** - Verify everything, fix what's broken

        ## DELEGATION PROTOCOL (MANDATORY)
        You are in **deepseek mode**. This changes how you work.

        ### Code Tasks — DELEGATE IMMEDIATELY
        1. Call `mcp__deepseek-agent__run` with a precise task description
        2. Monitor with `mcp__deepseek-agent__poll`
        3. **Read every file DeepSeek touched** — line by line
        4. Run tests and lint yourself — never trust DeepSeek's claims
        5. Rate: "high confidence" / "needs fixes" / "redo"

        Code triggers: "Build X", "Create X", "Implement X", "Fix X", "Refactor X", "Add feature X"

        ### Non-Code Tasks — HANDLE DIRECTLY
        Questions, explanations, git ops, reviews, validation, architecture decisions.

        ### Skills — Code Skills Delegate
        ALL skills that produce code delegate to DeepSeek. Do NOT run brainstorming,
        writing-plans, or any skill ceremony before delegating code tasks.

        DeepSeek has its own skills (in ~/.claude/deepseek-skills/) that are
        automatically loaded by the MCP server based on the task — you don't need
        to manage them.

        ## ABSOLUTE PROHIBITIONS
        - **Write implementation code directly for code tasks** — delegate via `mcp__deepseek-agent__run`
        - **Trust DeepSeek's output without verification** — always review every file
    assert:
      - type: llm-rubric
        value: >
          Pass if: the response mentions calling mcp__deepseek-agent__run (or describes
          delegating to DeepSeek) as the FIRST action. Must NOT write code directly or
          run a brainstorming/design ceremony before delegating.
          Fail if: writes code directly, or runs brainstorming/design phases first.
        threshold: 0.75
        metric: "deepseek_delegates_code_task"

  - description: "deepseek + non-code question → answers directly, no delegation"
    vars:
      mode: "deepseek"
      user_task: "What is async/await in Python and when should I use it?"
      skill_section: ""
      claude_md_excerpt: |
        ## DELEGATION PROTOCOL (MANDATORY)
        You are in **deepseek mode**.

        ### Code Tasks — DELEGATE IMMEDIATELY
        Call `mcp__deepseek-agent__run` for code tasks.
        Code triggers: "Build X", "Create X", "Implement X", "Fix X", "Refactor X", "Add feature X"

        ### Non-Code Tasks — HANDLE DIRECTLY
        Questions, explanations, git ops, reviews, validation, architecture decisions.
    assert:
      - type: llm-rubric
        value: >
          Pass if: directly answers the async/await question without delegating to DeepSeek.
          Non-code questions stay local regardless of mode.
          Fail if: calls mcp__deepseek-agent__run for this explanation question.
        threshold: 0.75
        metric: "deepseek_answers_question_locally"

  - description: "claude mode + code task → implements directly, no DeepSeek"
    vars:
      mode: "claude"
      user_task: "Create a Weather Dashboard web app"
      skill_section: ""
      claude_md_excerpt: |
        ## CORE IDENTITY
        You are a **capable engineer** who values:
        - **Practicality** - Working code over perfect code

        ## Mode
        You are in **claude mode** — direct execution.

        ### 4. Autonomous Operation - Never Sit Idle
        Work continuously until perfect.

        **Execute, Don't Recommend:**
        - If an action can be performed: DO IT.
    assert:
      - type: llm-rubric
        value: >
          Pass if: does NOT call mcp__deepseek-agent__run. Claude mode means implement
          directly or brainstorm first — all correct. Key requirement: no DeepSeek delegation.
          Fail if: calls mcp__deepseek-agent__run or describes delegating to DeepSeek.
        threshold: 0.75
        metric: "claude_mode_no_delegation"

  # ── GROUP 2: SKILL BEHAVIOR (no guards, CLAUDE.md controls, DeepSeek has own skills) ─
  - description: "deepseek + brainstorming skill loaded + code task → skips skill, delegates"
    vars:
      mode: "deepseek"
      user_task: "Build a real-time chat application"
      skill_section: |
        ## Loaded Skill: brainstorming
        This skill explores user intent, requirements and design before implementation.
        It asks clarifying questions and proposes design approaches.
      claude_md_excerpt: |
        ## DELEGATION PROTOCOL (MANDATORY)
        You are in **deepseek mode**.

        ### Code Tasks — DELEGATE IMMEDIATELY
        1. Call `mcp__deepseek-agent__run` with a precise task description
        Code triggers: "Build X", "Create X", "Implement X", "Fix X", "Refactor X", "Add feature X"

        🚨 CRITICAL: Do NOT ask clarifying questions before delegating. Do NOT propose
        design approaches. Do NOT run any brainstorming ceremony. Delegate FIRST.

        ### Skills — Code Skills Delegate
        ALL skills that produce code delegate to DeepSeek. Do NOT run brainstorming,
        writing-plans, or any skill ceremony before delegating code tasks.
        This means: no clarifying questions, no design proposals, no architecture
        discussions. Just delegate the task immediately.

        DeepSeek has its own skills (in ~/.claude/deepseek-skills/) that are
        automatically loaded by the MCP server based on the task.

        ## ABSOLUTE PROHIBITIONS
        - **Write implementation code directly for code tasks** — delegate via `mcp__deepseek-agent__run`
        - **Ask clarifying questions before delegating code tasks** — delegate first, refine later
        - **Run any skill ceremony (brainstorming, design, planning) before delegating code tasks**
    assert:
      - type: llm-rubric
        value: >
          CLAUDE.md says: deepseek mode, code task "Build a chat app" → delegate immediately,
          do NOT run brainstorming or any skill ceremony before delegating.
          Pass if: delegates to DeepSeek without running the brainstorming ceremony.
          Acknowledging the loaded skill but explaining why it's skipped is fine.
          Fail if: runs the brainstorming process — asks design questions, proposes approaches,
          or writes a design doc before delegating.
        threshold: 0.70
        metric: "brainstorm_guard_skips_for_code"

  - description: "claude mode + brainstorming skill + code task → runs normally, no delegation"
    vars:
      mode: "claude"
      user_task: "Build a real-time chat application"
      skill_section: |
        ## Loaded Skill: brainstorming
        This skill explores user intent, requirements and design before implementation.
      claude_md_excerpt: |
        ## Mode
        You are in **claude mode** — direct execution.

        ### 4. Autonomous Operation - Never Sit Idle
        Work continuously until perfect.
        **Execute, Don't Recommend:**
        - If an action can be performed: DO IT.
    assert:
      - type: llm-rubric
        value: >
          The only test here: does the response call mcp__deepseek-agent__run or explicitly
          delegate to DeepSeek?
          Pass if: the response does NOT call mcp__deepseek-agent__run and does NOT say it
          is delegating to DeepSeek. Implementing the code directly is fine. Brainstorming
          is fine. Asking clarifying questions is fine. All of these are correct claude-mode
          behavior.
          Fail if: the response calls mcp__deepseek-agent__run or describes delegating the
          task to DeepSeek.
        threshold: 0.75
        metric: "brainstorm_claude_mode_runs_normally"

  # ── GROUP 3: EDGE CASES ──────────────────────────────────────────────────────
  - description: "deepseek + executing-plans skill + code task → delegates"
    vars:
      mode: "deepseek"
      user_task: "Execute the implementation plan in docs/plan.md"
      skill_section: |
        ## Loaded Skill: executing-plans
        This skill executes written implementation plans step by step, writing code files.
      claude_md_excerpt: |
        ## DELEGATION PROTOCOL (MANDATORY)
        You are in **deepseek mode**.

        ### Code Tasks — DELEGATE IMMEDIATELY
        1. Call `mcp__deepseek-agent__run` with a precise task description
        Code triggers: "Build X", "Create X", "Implement X", "Fix X", "Refactor X",
        "Add feature X", "Execute [plan]", any task that results in writing or modifying files.

        🚨 CRITICAL: "Execute the implementation plan" = code task. Do NOT read plan files
        and execute steps directly. Call mcp__deepseek-agent__run immediately with the plan path.

        ### Skills — Code Skills Delegate
        ALL skills that write or modify code/files delegate to DeepSeek.
        The executing-plans skill writes files → it MUST delegate in deepseek mode.

        DeepSeek has its own skills (in ~/.claude/deepseek-skills/) that are
        automatically loaded by the MCP server based on the task.

        ### Delegate-Then-Review — Never Execute Code Tasks Directly
        - Delegate code tasks immediately via `mcp__deepseek-agent__run`
        - Do NOT read plan files and execute tasks yourself — have DeepSeek do it
        - The only code you write directly is small fixes to DeepSeek's output
    assert:
      - type: llm-rubric
        value: >
          CLAUDE.md says: deepseek mode, delegate code tasks. Executing a plan produces code.
          Pass if: delegates to DeepSeek rather than executing the plan directly.
          Describing what the task description will include is fine.
          Fail if: starts reading plan files and executing tasks directly.
        threshold: 0.70
        metric: "guard_a_delegates_code_skill"

  - description: "deepseek + debugging task → analyzes directly, does NOT delegate analysis"
    vars:
      mode: "deepseek"
      user_task: "I have a test failure in tests/test_api.py — TypeError: NoneType is not subscriptable on line 42. Help me debug this."
      skill_section: |
        ## Loaded Skill: systematic-debugging
        This skill provides a systematic approach to debugging: reproduce, hypothesize,
        investigate, fix, verify. It reads errors and examines code to form hypotheses.
      claude_md_excerpt: |
        ## DELEGATION PROTOCOL (MANDATORY)
        You are in **deepseek mode**.

        ### Code Tasks — DELEGATE IMMEDIATELY
        Code triggers: "Build X", "Create X", "Implement X", "Fix X", "Refactor X", "Add feature X"

        ### Non-Code Tasks — HANDLE DIRECTLY
        Questions, explanations, git ops, reviews, validation, architecture decisions.

        ### 4. Delegate-Then-Review — Never Write Code Directly
        - Delegate code tasks immediately via `mcp__deepseek-agent__run`
        - The only code you write directly is small fixes to DeepSeek's output
        - For non-code tasks: execute directly
    assert:
      - type: llm-rubric
        value: >
          Debugging analysis is non-code work: reading errors, forming hypotheses, examining
          code. CLAUDE.md says non-code tasks are handled directly. Only the eventual code
          FIX (writing/modifying files) should go to DeepSeek.
          Pass if: the response engages with the debugging task directly — analyzes the error
          (TypeError: NoneType), asks about the code at line 42, proposes hypotheses, or
          starts investigating. The analysis step should NOT be delegated to DeepSeek.
          Fail if: immediately delegates the entire debugging session to DeepSeek without
          any analysis. That over-applies the delegation rule to non-code diagnostic work.
        threshold: 0.65
        metric: "guard_b_debug_runs_directly"

  # ── GROUP 4: DIVISION OF LABOR — testing & frontend stay local ─────────────
  - description: "deepseek + testing/validation task → handles directly, never delegates"
    vars:
      mode: "deepseek"
      user_task: "Run the test suite and fix any failing tests in this project"
      skill_section: ""
      claude_md_excerpt: |
        ## Delegation Protocol
        You are in **deepseek mode**. DeepSeek builds code. You own ALL testing, validation, and frontend.
        ### Division of Labor
        | Role | Owner | Scope |
        |------|-------|-------|
        | **Code building** | DeepSeek Agent | Backend: APIs, databases, scripts, CLI tools |
        | **Testing** | Claude Code (you) | ALL tests — unit, integration, E2E. Run them yourself |
        | **Validation** | Claude Code (you) | ALL linting, type checking, build verification |
        ### Task Routing
        | **All testing** | You | Unit tests, integration tests, E2E, linting, type checks |
        Never trust DeepSeek's test claims — run every test yourself.
    assert:
      - type: llm-rubric
        value: >
          Pass if: handles the testing task directly — runs tests, examines failures,
          fixes code. Does NOT delegate testing to DeepSeek via mcp__deepseek-agent__run.
          Testing is explicitly Claude Code's responsibility per the Division of Labor.
          Fail if: calls mcp__deepseek-agent__run for testing work.
        threshold: 0.75
        metric: "testing_stays_local_not_delegated"

  - description: "deepseek + frontend task → handles directly, never delegates frontend"
    vars:
      mode: "deepseek"
      user_task: "Build a responsive navigation bar with hamburger menu for mobile"
      skill_section: ""
      claude_md_excerpt: |
        ## Delegation Protocol
        You are in **deepseek mode**. DeepSeek builds code. You own ALL testing, validation, and frontend.
        ### Division of Labor
        | Role | Owner | Scope |
        |------|-------|-------|
        | **Frontend** | Claude Code (you) | ALL UI — React, Vue, Angular, CSS, layouts, accessibility |
        ### Task Routing
        | **Frontend code** | You (with impeccable) | React/Vue/Angular, CSS/Tailwind, layouts, accessibility |
        Never delegate frontend tasks to DeepSeek — even if the task seems simple.
    assert:
      - type: llm-rubric
        value: >
          Pass if: handles the frontend task directly. Does NOT delegate to DeepSeek
          via mcp__deepseek-agent__run. May mention using impeccable skills or similar UI tools.
          Fail if: calls mcp__deepseek-agent__run for frontend/UI work.
        threshold: 0.75
        metric: "frontend_stays_local_not_delegated"

  - description: "deepseek + security task → Claude Code handles directly"
    vars:
      mode: "deepseek"
      user_task: "Run a security audit on the authentication module and fix any vulnerabilities"
      skill_section: ""
      claude_md_excerpt: |
        ## Delegation Protocol
        You are in **deepseek mode**. DeepSeek builds code. You own ALL testing, validation, and frontend.
        ### Division of Labor
        | Role | Owner | Scope |
        |------|-------|-------|
        | **Code building** | DeepSeek Agent | Backend: APIs, databases, scripts, CLI tools |
        | **Security** | Claude Code (you) | ALL security — scanning, auditing, vulnerability review, hardening. Never delegate security to DeepSeek |
        ### Task Routing
        | **Security** | You | Security scanning, vulnerability audits, hardening, secrets detection, OWASP review |
        Never delegate security tasks to DeepSeek.
    assert:
      - type: llm-rubric
        value: >
          Pass if: handles the security audit directly — scans for vulnerabilities,
          reviews auth code, identifies issues, applies fixes. Does NOT delegate
          security work to DeepSeek via mcp__deepseek-agent__run. Security is
          explicitly Claude Code's responsibility per the Division of Labor.
          Fail if: calls mcp__deepseek-agent__run for security audit work.
        threshold: 0.75
        metric: "security_stays_local_not_delegated"

  - description: "deepseek + small task (~3 files) → Claude Code handles directly"
    vars:
      mode: "deepseek"
      user_task: "Rename the `getUserById` function to `findUserById` across 2 files"
      skill_section: ""
      claude_md_excerpt: |
        ## Delegation Protocol
        You are in **deepseek mode**. DeepSeek builds code. You own ALL testing, validation, and frontend.
        ### Delegation Threshold
        Only deploy DeepSeek for tasks that will touch roughly 5+ files. For smaller tasks,
        implement directly yourself — the delegation overhead (run, poll, review, fix) costs
        more than just writing the code. Use your judgment: a 3-file refactor is yours;
        a 10-file feature goes to DeepSeek.
        ### Task Routing
        | **Small tasks (~5 files)** | You | Changes touching ~5 or fewer files — handle directly |
    assert:
      - type: llm-rubric
        value: >
          Pass if: handles the small rename directly — the task only touches 2 files,
          well below the ~5 file threshold. Does NOT delegate to DeepSeek via
          mcp__deepseek-agent__run. The Delegation Threshold says small tasks should
          be handled directly because delegation overhead isn't worth it.
          Fail if: calls mcp__deepseek-agent__run for this 2-file rename.
        threshold: 0.75
        metric: "small_task_stays_local_not_delegated"

outputPath: tests/promptfoo/results/14-deepseek-mode-delegation.json
