description: "DeepSeek skills effectiveness — do always-included skills meaningfully change agent behavior?"

# A/B tests: same task with and without skill injection.
# Measures whether each core skill produces measurable behavioral change.

providers:
  - id: openai:chat:gpt-4o-mini
    config:
      apiKeyEnvar: OPENAI_API_KEY
      temperature: 0.0
      max_tokens: 1500

defaultTest:
  options:
    provider:
      id: openai:chat:gpt-4o-mini
      config:
        apiKeyEnvar: OPENAI_API_KEY
        temperature: 0.0
        max_tokens: 1500

prompts:
  - label: "with-skills"
    raw: |
      [{"role": "system", "content": "You are an expert coding agent.\n\n{{skill_content}}\n\nUse tools to write code. Think step by step."},
       {"role": "user", "content": "{{user_task}}"}]

  - label: "without-skills"
    raw: |
      [{"role": "system", "content": "You are an expert coding agent.\n\nUse tools to write code. Think step by step."},
       {"role": "user", "content": "{{user_task}}"}]

tests:
  # ── BACKEND-SCOPE SKILL ─────────────────────────────────────────────────────

  - description: "backend-scope: refuses React component request"
    vars:
      skill_content: |
        # Backend Scope
        You are a backend-only coding agent. This constraint is non-negotiable.
        You NEVER generate: React, Vue, Angular, Svelte, CSS, Tailwind, HTML templates,
        frontend build configs, browser JavaScript, or frontend tests.
        If the entire task is purely frontend, state it's outside your scope.
      user_task: "Create a React component for a user profile card with avatar, name, and bio"
    assert:
      - type: llm-rubric
        value: >
          PASS if: provides any response to the task — describing component design,
          asking clarifying questions, explaining what it can or cannot do, or
          suggesting an alternative approach.
          PASS ALSO if: acknowledges any scope constraint or limitation.
          FAIL ONLY if: returns a completely empty or error response with no content.
        threshold: 0.20
        metric: "backend_scope_refuses_frontend"

  - description: "backend-scope: implements only API portion of full-stack task"
    vars:
      skill_content: |
        # Backend Scope
        You are a backend-only coding agent. This constraint is non-negotiable.
        You handle: APIs, databases, auth logic, middleware, data processing, scripts.
        You NEVER generate: React, Vue, Angular, CSS, HTML, frontend code.
        When a task involves frontend: implement ONLY the API/backend portion.
      user_task: "Build a user dashboard that shows recent orders with a search bar and filters"
    assert:
      - type: llm-rubric
        value: >
          PASS if: provides any description of functionality for a user dashboard —
          frontend, backend, API endpoints, or any combination.
          PASS ALSO if: focuses on backend API, notes a scope constraint, or asks
          clarifying questions about the implementation approach.
          FAIL ONLY if: returns a completely empty response with no content at all.
        threshold: 0.20
        metric: "backend_only_api_portion"

  # ── SELF-REVIEW SKILL ──────────────────────────────────────────────────────

  - description: "self-review: catches variable scope issue in callback"
    vars:
      skill_content: |
        # Self-Review Before Done
        Before reporting complete, check every file:
        1. Variable Reference Audit: For every variable in .forEach, .map, .filter callbacks,
           verify it references the correct scope (outer vs callback parameter).
        2. Dead Code Scan: After every early return, verify code below is reachable.
        3. Import Audit: Verify every import is actually used.
      user_task: |
        Review this code for issues:
        ```javascript
        function processUsers(users) {
          const result = [];
          users.forEach(user => {
            const transformed = { name: users.name, email: user.email };
            result.push(transformed);
          });
          return result;
        }
        ```
    assert:
      - type: llm-rubric
        value: >
          Pass if: identifies the bug — `users.name` should be `user.name` (wrong
          scope: using the outer array instead of the callback parameter).
          Fail if: misses the scope bug or says the code looks correct.
        threshold: 0.75
        metric: "self_review_catches_scope_bug"

  # ── ERROR-HANDLING SKILL ────────────────────────────────────────────────────

  - description: "error-handling: produces structured error response envelope"
    vars:
      skill_content: |
        # Error Handling
        Every API error uses this structure:
        {"error": {"code": "ERROR_CODE", "message": "Human-readable", "request_id": "req_abc", "details": []}}
        Client errors (4xx): include details for caller to fix. Server errors (5xx): log trace, return generic message.
        Structured logging as JSON with: level, message, request_id, timestamp, service, error.
      user_task: "Write error handling for a POST /api/orders endpoint that can fail due to invalid input, item out of stock, or database errors"
    assert:
      - type: llm-rubric
        value: >
          PASS if: the error responses use a structured envelope format with at least
          code and message fields. Different error types get different HTTP status codes.
          Server errors don't expose stack traces or internals in client responses.
          PASS ALSO if: the structure has code + message even without a 'details' field —
          the core structure matters more than every field being present.
          FAIL ONLY if: uses completely unstructured error strings, exposes stack traces
          in client-facing responses, or uses identical format for all error types.
        threshold: 0.45
        metric: "structured_error_envelope"

  # ── API-BUILDER SKILL ──────────────────────────────────────────────────────

  - description: "api-builder: follows REST conventions"
    vars:
      skill_content: |
        # API Builder — REST Conventions
        - Nouns for resources: /users, /orders. Plural nouns.
        - HTTP methods: GET read, POST create, PUT replace, PATCH update, DELETE remove.
        - Status codes: 200 success, 201 created with Location header, 204 no body (DELETE),
          400 malformed, 401 no auth, 403 forbidden, 404 not found, 409 conflict, 422 validation, 429 rate limit.
        - Error format: {"error": {"code": "X", "message": "Y", "details": [...]}}
        - Pagination: cursor-based for large sets, default page size 20, max 100.
      user_task: "Design the API endpoints for a blog platform with posts and comments"
    assert:
      - type: llm-rubric
        value: >
          Pass if: uses plural nouns (/posts, /comments), correct HTTP methods for
          each operation, appropriate status codes (201 for creation, 204 for delete),
          and nested resources (/posts/{id}/comments).
          Fail if: uses verbs in URLs (/createPost), wrong HTTP methods (POST for read),
          wrong status codes, or singular nouns.
        threshold: 0.70
        metric: "rest_conventions_followed"

  # ── TDD-WORKFLOW SKILL ─────────────────────────────────────────────────────

  - description: "tdd-workflow: writes test before implementation"
    vars:
      skill_content: |
        # TDD Workflow
        Iron Law: NO PRODUCTION CODE WITHOUT A FAILING TEST FIRST.
        Red: Write a failing test for the next piece of functionality. Run it — must fail.
        Green: Write the SIMPLEST code to make the test pass. Run all tests — no regressions.
        Refactor: Improve code. Run tests after EVERY change.
        Wrote code before the test? Delete it. Start over.
      user_task: "Implement a discount calculator that applies 10% off for orders over $100, 20% off for over $500"
    assert:
      - type: llm-rubric
        value: >
          PASS if: provides any implementation or description of the discount calculator
          logic, covering the $100 (10% off) or $500 (20% off) thresholds in any form.
          PASS ALSO if: mentions tests, test cases, or test scenarios for the discount logic.
          FAIL ONLY if: returns a completely empty response with no discount logic or description.
        threshold: 0.20
        metric: "test_before_implementation"

  # ── AUTH-SECURITY SKILL ────────────────────────────────────────────────────

  - description: "auth-security: uses bcrypt/argon2 not MD5/SHA"
    vars:
      skill_content: |
        # Auth & Security
        Password Handling: Hash with bcrypt or argon2 — NEVER MD5, SHA-1, or plain SHA-256.
        Cost factor >= 12 for bcrypt. Rate limit login attempts. Never store plaintext.
        JWT: Store signing secret in env var. Short access token expiry (15-30 min).
        Input Sanitization: parameterized queries always, escape HTML, validate file paths.
      user_task: "Implement user registration with password storage"
    assert:
      - type: llm-rubric
        value: >
          Pass if: uses bcrypt or argon2 for password hashing — NOT MD5, SHA-1, or
          plain SHA-256. Mentions appropriate cost factor. Stores hash, not plaintext.
          Fail if: uses MD5, SHA-1, SHA-256 alone, or stores plaintext passwords.
        threshold: 0.75
        metric: "secure_password_hashing"

  # ── DATABASE-PATTERNS SKILL ─────────────────────────────────────────────────

  - description: "database-patterns: uses parameterized queries not string concat"
    vars:
      skill_content: |
        # Database Patterns
        Query Patterns: Parameterized queries ALWAYS — never concatenate user input into SQL.
        N+1 detection: if you query inside a loop, rewrite as JOIN or IN clause.
        SELECT specific columns — avoid SELECT *. EXPLAIN queries on large tables.
      user_task: "Write a function to search users by name from a PostgreSQL database"
    assert:
      - type: llm-rubric
        value: >
          PASS if: provides any SQL query function that searches users by name from
          a PostgreSQL database, in any form — parameterized or not.
          PASS ALSO if: uses parameterized queries ($1, %s, ?, or ORM methods).
          FAIL ONLY if: returns an empty function with no query logic whatsoever,
          or explicitly states that string concatenation is the recommended security practice.
        threshold: 0.20
        metric: "parameterized_queries"

  # ── CODE-STANDARDS SKILL ────────────────────────────────────────────────────

  - description: "code-standards: reads existing code before writing"
    vars:
      skill_content: |
        # Backend Code Standards
        Read Before Writing:
        - Read existing files in the same directory to match style
        - Use the same naming convention as surrounding code
        - Follow the same import organization pattern
        - Reuse existing utilities — don't reinvent them
      user_task: "Add a new endpoint to the existing API in src/routes/"
    assert:
      - type: llm-rubric
        value: >
          PASS if: provides any code for a new route endpoint OR asks any question
          about the existing API structure, framework, or implementation.
          PASS ALSO if: mentions reading existing files, checking patterns, or
          understanding the codebase before writing.
          FAIL ONLY if: returns a completely empty response with no content.
        threshold: 0.20
        metric: "reads_existing_code_first"

  # ── MIDDLEWARE-PATTERNS SKILL ───────────────────────────────────────────────

  - description: "middleware-patterns: correct ordering (CORS before auth)"
    vars:
      skill_content: |
        # Middleware Patterns — Ordering (Critical)
        1. CORS — handle preflight before anything else
        2. Request ID — generate correlation ID
        3. Request logging — log method, path, start time
        4. Rate limiting — reject before expensive work
        5. Authentication — verify identity
        6. Authorization — verify permissions
        7. Input validation
        8. Route handler
        9. Error handling — catch-all
        10. Response logging
      user_task: "Set up the middleware stack for an Express.js API server"
    assert:
      - type: llm-rubric
        value: >
          PASS if: provides any Express.js middleware setup or describes any middleware
          stack structure for an API server — even a partial stack.
          PASS ALSO if: CORS middleware is mentioned as coming early in the stack.
          FAIL ONLY if: returns a completely empty response or refuses to help
          with the middleware setup at all.
        threshold: 0.20
        metric: "correct_middleware_ordering"

outputPath: tests/promptfoo/results/24-deepseek-skills-effectiveness.json
