description: "DeepSeek planning prompt — JSON completeness, field quality, constraint respect, edit accuracy"

# Enhanced tests for planning_system.txt — goes beyond structural checks
# to test semantic quality of plans produced by the planning prompt.

providers:
  - id: openai:chat:gpt-4o-mini
    config:
      apiKeyEnvar: OPENAI_API_KEY
      temperature: 0.0
      max_tokens: 8192
      response_format:
        type: json_object

prompts:
  - label: "current-planning-prompt"
    raw: '[{"role": "system", "content": "You are a software planning assistant. Your supervisor gives you a task description (WHAT to build). Your job is to investigate the codebase and produce a COMPREHENSIVE implementation plan. Your supervisor reviews this plan carefully before approving.\n\nDo NOT call any tools. Do NOT include any text outside the JSON object.\n\n## Plan Output\n\nOutput ONLY a valid JSON object with this structure (no other text):\n{\n  \"summary\": \"one-sentence description of what will be done\",\n  \"rationale\": \"why these changes are needed\",\n  \"codebase_analysis\": {\n    \"files_read\": [\"src/app.py\", \"src/models.py\"],\n    \"entities_found\": [\n      {\n        \"path\": \"src/app.py\",\n        \"entity_type\": \"function\",\n        \"name\": \"process_request\",\n        \"line_number\": 42,\n        \"signature\": \"def process_request(req: Request) -> Response\",\n        \"context\": \"handles incoming HTTP requests\"\n      }\n    ],\n    \"patterns_observed\": [\"repository pattern\", \"Pydantic validation\"],\n    \"dependencies\": [\"fastapi\", \"pydantic\"]\n  },\n  \"file_changes\": [\n    {\n      \"path\": \"relative/path/to/file\",\n      \"action\": \"create|modify|delete\",\n      \"description\": \"what changes and why\",\n      \"diff_preview\": \"5-8 line pseudocode sketch of key signatures\"\n    }\n  ],\n  \"steps\": [\"Step 1: ...\", \"Step 2: ...\"],\n  \"tools_per_step\": [[\"file_ops\", \"executor\"], [\"file_ops\"]],\n  \"tool_calls_planned\": [\n    {\n      \"step_index\": 0,\n      \"tool\": \"file_ops\",\n      \"action\": \"edit_file\",\n      \"args\": {\n        \"path\": \"src/app.py\",\n        \"old_string\": \"EXACT text from read_file \u2014 copy character-for-character\",\n        \"new_string\": \"replacement text\"\n      },\n      \"description\": \"Add error handling to process_request\"\n    }\n  ],\n  \"risk_assessment\": [\n    {\n      \"change_index\": 0,\n      \"risk_level\": \"low|medium|high\",\n      \"risk_factors\": [\"modifies public API\"],\n      \"mitigation\": \"backward compatible \u2014 adds optional parameter\"\n    }\n  ],\n  \"rollback_steps\": [\"Revert src/app.py to original version\"],\n  \"step_dependencies\": [\n    {\"step_index\": 1, \"depends_on\": [0], \"reason\": \"Step 1 creates file Step 2 edits\"}\n  ],\n  \"verification_steps\": [\n    {\n      \"description\": \"what is being verified\",\n      \"command\": \"python3 -c \\\"from src.app import process_request; print(''OK'')\\\"\",\n      \"expected\": \"prints OK without error\"\n    }\n  ],\n  \"estimated_tokens\": 2000\n}\n\n## FIELD RULES (ranked by rejection frequency)\n\n### #1 REJECTION CAUSE: tool_calls_planned\n- For EVERY edit_file: old_string must be EXACT text from read_file \u2014 character-for-character\n- For EVERY write_file: include the full file content in args\n- For EVERY executor call: include the exact shell command\n- Your supervisor WILL verify old_string against actual file contents\n- Common mistakes that cause rejection:\n  - Paraphrasing instead of copying exact text\n  - Missing whitespace, indentation, or trailing newlines\n  - Using a function name without its full context (surrounding lines)\n  - Forgetting to include import statements in old_string when they''re adjacent\n\n### #2: codebase_analysis\n- files_read: list EVERY file you investigated \u2014 if you plan to edit a file, it MUST appear here\n- entities_found: include line numbers and exact signatures \u2014 supervisor verifies them\n- Editing a file NOT in files_read is an automatic rejection\n\n### #3: verification_steps\n- At least one per major feature\n- Commands must test BEHAVIOR (call the function, hit the endpoint) \u2014 not just check file existence\n- Must be executable: python3, node, pytest, curl, or bash\n- Supervisor executes these. You write them but do not run them.\n\n### #4: risk_assessment\n- One entry per file_change minimum\n- High risk: public APIs, database schemas, auth\n- Medium risk: new dependencies, shared utilities\n- Low risk: new files, internal functions\n\n### #5: steps + tools_per_step\n- MUST be same length \u2014 tools_per_step[i] maps to steps[i]\n- Use exact names: file_ops, executor, code_gen, git_ops, test_runner\n- Order steps by dependency: models before services, services before routes\n\n### #6: diff_preview\n- SHORT pseudocode sketch per file_change (5-8 lines max)\n- Key signatures, class names, config keys \u2014 NOT full file contents\n\n## PLAN VALIDATION\n\nYour plan is AUTOMATICALLY VALIDATED. Missing required fields = sent back for correction.\n\nREQUIRED (plan rejected without these):\n- codebase_analysis with files_read and entities_found (with signatures + line numbers)\n- tool_calls_planned with EXACT args for every file operation\n- verification_steps with executable behavioral commands\n- risk_assessment with one entry per file_change\n- file_changes with diff_preview for every entry\n- steps and tools_per_step (same length)\n\nOPTIONAL but expected for complex tasks:\n- rollback_steps\n- step_dependencies\n\n## CONCRETE EXAMPLE (minimal but complete)\n\nTask: \"Add a /health endpoint to src/app.py\"\n\n```json\n{\n  \"summary\": \"Add GET /health endpoint returning service status\",\n  \"rationale\": \"Health checks needed for container orchestration readiness probes\",\n  \"codebase_analysis\": {\n    \"files_read\": [\"src/app.py\"],\n    \"entities_found\": [\n      {\"path\": \"src/app.py\", \"entity_type\": \"variable\", \"name\": \"app\", \"line_number\": 5, \"signature\": \"app = FastAPI()\", \"context\": \"FastAPI application instance\"}\n    ],\n    \"patterns_observed\": [\"FastAPI with router pattern\"],\n    \"dependencies\": [\"fastapi\"]\n  },\n  \"file_changes\": [\n    {\"path\": \"src/app.py\", \"action\": \"modify\", \"description\": \"Add /health GET endpoint\", \"diff_preview\": \"@app.get(''/health'')\\ndef health():\\n    return {''status'': ''ok''}\"}\n  ],\n  \"steps\": [\"Step 1: Add health endpoint to src/app.py\"],\n  \"tools_per_step\": [[\"file_ops\"]],\n  \"tool_calls_planned\": [\n    {\"step_index\": 0, \"tool\": \"file_ops\", \"action\": \"edit_file\", \"args\": {\"path\": \"src/app.py\", \"old_string\": \"app = FastAPI()\", \"new_string\": \"app = FastAPI()\\n\\n@app.get(''/health'')\\ndef health():\\n    return {''status'': ''ok''}\"}, \"description\": \"Add health endpoint after app initialization\"}\n  ],\n  \"risk_assessment\": [\n    {\"change_index\": 0, \"risk_level\": \"low\", \"risk_factors\": [\"adds new endpoint only\"], \"mitigation\": \"no existing code modified\"}\n  ],\n  \"verification_steps\": [\n    {\"description\": \"health endpoint responds\", \"command\": \"python3 -c \\\"from src.app import app; from fastapi.testclient import TestClient; c=TestClient(app); r=c.get(''/health''); assert r.status_code==200; print(''OK'')\\\"\", \"expected\": \"prints OK\"}\n  ],\n  \"estimated_tokens\": 500\n}\n```"}, {"role": "user", "content": "TASK (output as JSON): {{task}}"}]'

tests:
  # ── STRUCTURAL COMPLETENESS (deterministic JSON checks) ─────────────────────

  - description: "produces valid JSON with all top-level fields"
    vars:
      task: "Add a /users/{id}/orders endpoint to the FastAPI app in src/app.py that returns paginated orders for a user"
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          if (!m) return { pass: false, score: 0, reason: 'No JSON object found' };
          try {
            const plan = JSON.parse(m[0]);
            const required = ['summary', 'codebase_analysis', 'file_changes', 'steps',
                              'tools_per_step', 'tool_calls_planned', 'risk_assessment',
                              'verification_steps'];
            const missing = required.filter(f => !plan[f]);
            if (missing.length > 0) {
              return { pass: false, score: 0, reason: `Missing fields: ${missing.join(', ')}` };
            }
            return { pass: true, score: 1, reason: 'All required fields present' };
          } catch (e) {
            return { pass: false, score: 0, reason: `Parse error: ${e.message}` };
          }
        metric: "all_required_fields"

  - description: "codebase_analysis has files_read and entities_found"
    vars:
      task: "Add rate limiting middleware to the Express app in src/server.js using express-rate-limit"
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          if (!m) return { pass: false, score: 0, reason: 'No JSON found' };
          try {
            const plan = JSON.parse(m[0]);
            const ca = plan.codebase_analysis;
            if (!ca) return { pass: false, score: 0, reason: 'Missing codebase_analysis' };
            if (!ca.files_read || ca.files_read.length === 0)
              return { pass: false, score: 0, reason: 'files_read is empty' };
            if (!ca.entities_found || ca.entities_found.length === 0)
              return { pass: false, score: 0, reason: 'entities_found is empty' };
            const hasSignature = ca.entities_found.some(e => e.signature);
            if (!hasSignature)
              return { pass: false, score: 0, reason: 'entities_found has no signatures' };
            return { pass: true, score: 1, reason: `${ca.files_read.length} files, ${ca.entities_found.length} entities` };
          } catch (e) {
            return { pass: false, score: 0, reason: `Parse error: ${e.message}` };
          }
        metric: "codebase_analysis_quality"

  - description: "tool_calls_planned has edit_file with old_string and new_string"
    vars:
      task: "Modify the existing authentication middleware in src/middleware/auth.js to add JWT refresh token support. The file currently validates access tokens."
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          if (!m) return { pass: false, score: 0, reason: 'No JSON found' };
          try {
            const plan = JSON.parse(m[0]);
            const tcp = plan.tool_calls_planned;
            if (!tcp || tcp.length === 0)
              return { pass: false, score: 0, reason: 'No tool_calls_planned' };
            const editCalls = tcp.filter(t => t.action === 'edit_file' || (t.tool === 'file_ops' && t.action === 'edit_file'));
            if (editCalls.length === 0)
              return { pass: false, score: 0, reason: 'No edit_file calls planned (task modifies existing file)' };
            const hasOldString = editCalls.some(t => t.args && t.args.old_string && t.args.old_string.length > 5);
            if (!hasOldString)
              return { pass: false, score: 0, reason: 'edit_file calls lack meaningful old_string values' };
            return { pass: true, score: 1, reason: `${editCalls.length} edit_file calls with old_string` };
          } catch (e) {
            return { pass: false, score: 0, reason: `Parse error: ${e.message}` };
          }
        metric: "tool_calls_have_edit_args"

  - description: "risk_assessment has one entry per file_change"
    vars:
      task: "Refactor the database layer: modify src/db/connection.js, src/db/queries.js, and src/models/user.js to use connection pooling"
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          if (!m) return { pass: false, score: 0, reason: 'No JSON found' };
          try {
            const plan = JSON.parse(m[0]);
            const fc = plan.file_changes || [];
            const ra = plan.risk_assessment || [];
            if (ra.length === 0) return { pass: false, score: 0, reason: 'No risk_assessment entries' };
            if (ra.length < fc.length)
              return { pass: false, score: 0, reason: `Only ${ra.length} risks for ${fc.length} file_changes` };
            return { pass: true, score: 1, reason: `${ra.length} risks for ${fc.length} changes` };
          } catch (e) {
            return { pass: false, score: 0, reason: `Parse error: ${e.message}` };
          }
        metric: "risk_per_file_change"

  - description: "verification_steps have executable commands"
    vars:
      task: "Add input validation to POST /api/users endpoint in src/routes/users.py using Pydantic"
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          if (!m) return { pass: false, score: 0, reason: 'No JSON found' };
          try {
            const plan = JSON.parse(m[0]);
            const vs = plan.verification_steps || [];
            if (vs.length === 0) return { pass: false, score: 0, reason: 'No verification_steps' };
            const executable = vs.filter(s => s.command && s.command.trim().length > 10);
            if (executable.length === 0)
              return { pass: false, score: 0, reason: 'No steps with executable commands (>10 chars)' };
            const behavioral = executable.some(s =>
              s.command.includes('python') || s.command.includes('node') ||
              s.command.includes('curl') || s.command.includes('pytest') ||
              s.command.includes('bash'));
            if (!behavioral)
              return { pass: false, score: 0, reason: 'Commands are not behavioral tests (no python/node/curl/pytest)' };
            return { pass: true, score: 1, reason: `${executable.length} executable verification steps` };
          } catch (e) {
            return { pass: false, score: 0, reason: `Parse error: ${e.message}` };
          }
        metric: "executable_verification"

  - description: "steps and tools_per_step are parallel arrays"
    vars:
      task: "Create a caching layer: new file src/cache.py with Redis client, modify src/routes/products.py to use cache"
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          if (!m) return { pass: false, score: 0, reason: 'No JSON found' };
          try {
            const plan = JSON.parse(m[0]);
            if (!plan.steps || !plan.tools_per_step)
              return { pass: false, score: 0, reason: 'Missing steps or tools_per_step' };
            if (plan.steps.length !== plan.tools_per_step.length)
              return { pass: false, score: 0, reason: `Mismatch: ${plan.steps.length} steps vs ${plan.tools_per_step.length} tools_per_step` };
            // Accept single-step if it has multiple tool_calls_planned (one step may cover both files)
            if (plan.steps.length < 1)
              return { pass: false, score: 0, reason: 'No steps at all' };
            const toolCount = (plan.tool_calls_planned || []).length;
            if (plan.steps.length < 2 && toolCount < 2)
              return { pass: false, score: 0, reason: `Only ${plan.steps.length} step and ${toolCount} tool calls — expected multi-step work` };
            return { pass: true, score: 1, reason: `${plan.steps.length} steps, ${toolCount} tool calls — aligned` };
          } catch (e) {
            return { pass: false, score: 0, reason: `Parse error: ${e.message}` };
          }
        metric: "parallel_arrays"

  # ── BEHAVIORAL QUALITY (semantic checks) ────────────────────────────────────

  - description: "respects do-not-modify constraints"
    vars:
      task: "Add request logging middleware. Constraint: do NOT modify src/auth.py, src/config.py, or any test files."
    assert:
      - type: llm-rubric
        value: >
          Pass if: the plan JSON does NOT list src/auth.py, src/config.py, or any
          files in tests/ directory in file_changes. The constraint explicitly forbids
          modifying those files.
          Fail if: file_changes includes any of the forbidden files.
        threshold: 0.75
        metric: "respects_constraints"

  - description: "does not create unnecessary files"
    vars:
      task: "Add a helper function to the existing utils module at src/utils.py. Do not create new files."
    assert:
      - type: llm-rubric
        value: >
          PASS if: file_changes does NOT include any "create" actions for new utility files
          (like src/utils/helpers.py, src/helpers.py, or any new .py files), AND file_changes
          includes src/utils.py as a modify action (adding to the existing module as requested).
          PASS ALSO if: file_changes includes src/utils.py as a modify action and any other
          modifications are to existing files (not new utility files).
          FAIL ONLY if: file_changes proposes creating new files like src/helpers.py or
          src/utils/helpers.py instead of modifying the existing src/utils.py.
        threshold: 0.65
        metric: "no_unnecessary_files"

  - description: "diff_preview is concise (5-8 lines), not full file content"
    vars:
      task: "Add a new GET /api/stats endpoint to the FastAPI app in src/main.py"
    assert:
      - type: llm-rubric
        value: >
          Pass if: each file_change entry has a diff_preview field containing a
          SHORT sketch (roughly 5-8 lines) showing key function signatures or
          structural changes — not the full file content.
          Fail if: diff_preview is missing, empty, or contains 20+ lines of full
          implementation code instead of a concise sketch.
        threshold: 0.70
        metric: "concise_diff_preview"

  - description: "plan output is ONLY JSON — no surrounding text"
    vars:
      task: "Add CORS configuration to the Express server in src/app.js"
    assert:
      - type: javascript
        value: |
          const trimmed = output.trim();
          // Check if the output starts with { (possibly after whitespace)
          const startsWithJson = /^\s*\{/.test(trimmed);
          // Check if there's significant non-JSON text before or after
          const m = trimmed.match(/^([\s\S]*?)(\{[\s\S]*\})([\s\S]*?)$/);
          if (!m) return { pass: false, score: 0, reason: 'No JSON object found' };
          const before = m[1].trim();
          const after = m[3].trim();
          const extraText = before.length + after.length;
          if (extraText > 50) {
            return { pass: false, score: 0, reason: `${extraText} chars of non-JSON text (before: "${before.slice(0,30)}...", after: "${after.slice(0,30)}...")` };
          }
          return { pass: true, score: 1, reason: startsWithJson ? 'Clean JSON output' : `Minor preamble (${before.length} chars)` };
        metric: "json_only_output"

  - description: "handles multi-file task with correct dependency ordering"
    vars:
      task: "Build a new notification system: 1) Create src/models/notification.py with SQLAlchemy model, 2) Create src/services/notification.py with send logic, 3) Add POST /api/notifications endpoint to src/routes/notifications.py"
    assert:
      - type: llm-rubric
        value: >
          PASS if: the plan addresses all 3 files (src/models/notification.py,
          src/services/notification.py, src/routes/notifications.py) in file_changes,
          AND the ordering or structure shows model before service, service before route
          (OR acknowledges the dependency relationship in any way — e.g., risk_assessment,
          step_dependencies, or description mentioning that service depends on model).
          PASS ALSO if: the plan creates all 3 files and tool_calls_planned shows model
          created first, even if consolidated into fewer steps.
          FAIL ONLY if: the plan completely omits one of the 3 required files, OR creates
          the route handler before the model (clearly wrong dependency order).
        threshold: 0.65
        metric: "correct_step_ordering"

  # ── RECOVERY / CORRECTION ───────────────────────────────────────────────────

  - description: "fills in missing fields after validation feedback"
    vars:
      task: |
        Your plan was parsed but is INCOMPLETE. Fix these issues:

        1. MISSING codebase_analysis.files_read — list every file investigated
        2. MISSING tool_calls_planned — include exact tool calls with args
        3. MISSING verification_steps — include executable commands

        Original task: Add pagination to GET /api/products in src/routes/products.py

        Output the COMPLETE plan JSON with all fields filled in.
    assert:
      - type: javascript
        value: |
          const m = output.match(/\{[\s\S]*\}/);
          if (!m) return { pass: false, score: 0, reason: 'No JSON found' };
          try {
            const plan = JSON.parse(m[0]);
            const issues = [];
            if (!plan.codebase_analysis?.files_read?.length) issues.push('codebase_analysis.files_read');
            if (!plan.tool_calls_planned?.length) issues.push('tool_calls_planned');
            if (!plan.verification_steps?.length) issues.push('verification_steps');
            if (issues.length > 0)
              return { pass: false, score: 0, reason: `Still missing: ${issues.join(', ')}` };
            return { pass: true, score: 1, reason: 'All previously missing fields now present' };
          } catch (e) {
            return { pass: false, score: 0, reason: `Parse error: ${e.message}` };
          }
        metric: "fills_missing_fields"

outputPath: tests/promptfoo/results/23-deepseek-planning-prompt.json
